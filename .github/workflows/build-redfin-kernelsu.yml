name: Build Pixel 5 KernelSU

on:
  workflow_dispatch:
    inputs:
      ksu_tag:
        description: KernelSU tag for non-GKI kernels
        required: true
        default: v0.9.5
      build_config:
        description: Google kernel build config
        required: true
        default: private/msm-google/build.config.redbull
      disable_cc_werror:
        description: Disable CONFIG_CC_WERROR in redbull_defconfig
        required: true
        type: boolean
        default: true
      localversion:
        description: Kernel localversion to match stock vendor_boot modules
        required: true
        default: -g7b0944645172-ab10812814

permissions:
  contents: read

jobs:
  build:
    name: Build redfin KernelSU
    runs-on: ubuntu-22.04
    env:
      MANIFEST_BRANCH: android-msm-redbull-4.19-android14
      KERNEL_DIR: private/msm-google
      DEFCONFIG: redbull_defconfig
      ARCH: arm64
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl device-tree-compiler flex git \
            libelf-dev liblz4-tool libncurses-dev libssl-dev lld python-is-python3 \
            python3 rsync unzip zip

      - name: Install repo tool
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Sync Google redbull kernel tree
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b "$MANIFEST_BRANCH" \
            --depth=1
          repo sync -c --no-tags --fail-fast -j"$(nproc)"

      - name: Integrate KernelSU
        run: |
          cd "kernel_workspace/$KERNEL_DIR"
          curl -fsSL "https://raw.githubusercontent.com/tiann/KernelSU/${{ inputs.ksu_tag }}/kernel/setup.sh" \
            | bash -s "${{ inputs.ksu_tag }}"
          KSU_VERSION="$(cd KernelSU && expr "$(git rev-list --count HEAD)" + 10200)"
          echo "KSU_VERSION=$KSU_VERSION" >> "$GITHUB_ENV"

      - name: Patch non-GKI KernelSU hooks
        run: |
          cd "kernel_workspace/$KERNEL_DIR"
          python3 <<'PY'
          import re
          from pathlib import Path

          def edit(path, fn):
              p = Path(path)
              s = p.read_text()
              ns = fn(s)
              if ns == s:
                  return
              p.write_text(ns)

          def insert_before(path, marker, block):
              def apply(s):
                  if block in s:
                      return s
                  if marker not in s:
                      raise SystemExit(f"marker not found in {path}: {marker!r}")
                  return s.replace(marker, block + marker, 1)
              edit(path, apply)

          def replace_re(path, pattern, block, present):
              def apply(s):
                  if present in s:
                      return s
                  ns, n = re.subn(pattern, lambda m: m.group(1) + block + m.group(2), s, count=1, flags=re.S)
                  if n != 1:
                      raise SystemExit(f"pattern not found in {path}: {pattern}")
                  return ns
              edit(path, apply)

          insert_before(
              "fs/exec.c",
              "static int do_execveat_common",
              """#ifdef CONFIG_KSU
          extern bool ksu_execveat_hook __read_mostly;
          extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv,
                      void *envp, int *flags);
          extern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr,
                       void *argv, void *envp, int *flags);
          #endif
          """,
          )
          replace_re(
              "fs/exec.c",
              r"(static int do_execveat_common\(int fd, struct filename \*filename,\s*struct user_arg_ptr argv,\s*struct user_arg_ptr envp,\s*int flags\)\s*\{\s*)(return __do_execve_file\(fd, filename, argv, envp, flags, NULL\);)",
              """#ifdef CONFIG_KSU
              if (unlikely(ksu_execveat_hook))
                  ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);
              else
                  ksu_handle_execveat_sucompat(&fd, &filename, &argv, &envp, &flags);
          #endif
          """,
              "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags)",
          )

          insert_before(
              "fs/open.c",
              "/*\n * access() needs to use the real uid/gid, not the effective uid/gid.",
              """#ifdef CONFIG_KSU
          extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode,
                       int *flags);
          #endif
          """,
          )
          replace_re(
              "fs/open.c",
              r"(long do_faccessat\(int dfd, const char __user \*filename, int mode\)\s*\{.*?unsigned int lookup_flags = LOOKUP_FOLLOW;\s*)()",
              """#ifdef CONFIG_KSU
              ksu_handle_faccessat(&dfd, &filename, &mode, NULL);
          #endif
          """,
              "ksu_handle_faccessat(&dfd, &filename, &mode, NULL)",
          )

          insert_before(
              "fs/read_write.c",
              "ssize_t vfs_read",
              """#ifdef CONFIG_KSU
          extern bool ksu_vfs_read_hook __read_mostly;
          extern int ksu_handle_vfs_read(struct file **file_ptr, char __user **buf_ptr,
                      size_t *count_ptr, loff_t **pos);
          #endif
          """,
          )
          replace_re(
              "fs/read_write.c",
              r"(ssize_t vfs_read\(struct file \*file, char __user \*buf, size_t count, loff_t \*pos\)\s*\{\s*ssize_t ret;\s*)()",
              """#ifdef CONFIG_KSU
              if (unlikely(ksu_vfs_read_hook))
                  ksu_handle_vfs_read(&file, &buf, &count, &pos);
          #endif
          """,
              "ksu_handle_vfs_read(&file, &buf, &count, &pos)",
          )

          insert_before(
              "fs/stat.c",
              "/**\n * vfs_statx - Get basic and extra attributes by filename",
              """#ifdef CONFIG_KSU
          extern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);
          #endif
          """,
          )
          replace_re(
              "fs/stat.c",
              r"(int vfs_statx\(int dfd, const char __user \*filename, int flags,\s*struct kstat \*stat, u32 request_mask\)\s*\{.*?unsigned int lookup_flags = LOOKUP_FOLLOW \| LOOKUP_AUTOMOUNT;\s*)()",
              """#ifdef CONFIG_KSU
              ksu_handle_stat(&dfd, &filename, &flags);
          #endif
          """,
              "ksu_handle_stat(&dfd, &filename, &flags)",
          )
          PY

      - name: Patch redbull defconfig
        run: |
          cd "kernel_workspace/$KERNEL_DIR"
          DEFCONFIG_PATH="arch/$ARCH/configs/$DEFCONFIG"
          scripts/config --file "$DEFCONFIG_PATH" \
            --set-str LOCALVERSION "${{ inputs.localversion }}" \
            -d LOCALVERSION_AUTO \
            -e KSU \
            -e MODULES \
            -d KPROBES \
            -d KPROBE_EVENTS \
            -d DEBUG_FS \
            -e OVERLAY_FS
          if [[ "${{ inputs.disable_cc_werror }}" == "true" ]]; then
            scripts/config --file "$DEFCONFIG_PATH" -d CC_WERROR
          fi
          grep -E 'CONFIG_(KSU|KPROBES|KPROBE_EVENTS|DEBUG_FS|OVERLAY_FS|CC_WERROR)' "$DEFCONFIG_PATH" || true

      - name: Build kernel
        run: |
          cd kernel_workspace
          CUSTOM_BUILD_CONFIG="${{ inputs.build_config }}.kernelsu"
          cp "${{ inputs.build_config }}" "$CUSTOM_BUILD_CONFIG"
          if grep -q 'update_nocfi_config' "$CUSTOM_BUILD_CONFIG"; then
            echo 'POST_DEFCONFIG_CMDS="update_nocfi_config"' >> "$CUSTOM_BUILD_CONFIG"
          else
            echo 'POST_DEFCONFIG_CMDS=""' >> "$CUSTOM_BUILD_CONFIG"
          fi
          echo 'LOCALVERSION=' >> "$CUSTOM_BUILD_CONFIG"
          echo 'KBUILD_BUILD_USER=ksu-codex' >> "$CUSTOM_BUILD_CONFIG"
          echo 'KBUILD_BUILD_HOST=redfin-manual' >> "$CUSTOM_BUILD_CONFIG"
          echo "Using BUILD_CONFIG=$CUSTOM_BUILD_CONFIG"
          BUILD_CONFIG="$CUSTOM_BUILD_CONFIG" build/build.sh

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          if [[ -d kernel_workspace/out ]]; then
            find kernel_workspace/out -type f \( \
              -name 'Image.lz4' -o \
              -name 'boot.img' -o \
              -name '.config' -o \
              -name 'System.map' -o \
              -name 'vmlinux' \
            \) -print
            find kernel_workspace/out -type f \( \
              -name 'Image.lz4' -o \
              -name 'boot.img' -o \
              -name '.config' -o \
              -name 'System.map' \
            \) -exec cp -v '{}' artifacts/ ';'
          fi
          tar -C artifacts -czf redfin-kernelsu-artifacts.tar.gz . || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redfin-kernelsu-${{ inputs.ksu_tag }}-${{ github.run_number }}
          path: |
            redfin-kernelsu-artifacts.tar.gz
            artifacts/*
